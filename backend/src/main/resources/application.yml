server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001}

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/spare_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.langdong.spare.entity

jwt:
  secret: ${JWT_SECRET:spare-management-system-secret-key-2024-langdong}
  expiration: 86400000

ai:
  python:
    base-url: ${AI_PYTHON_BASE_URL:http://localhost:8000}
    callback-token: ${PYTHON_CALLBACK_TOKEN:langdong-local-dev-20260330}

forecast:
  # 月初两阶段 Hurdle-Gamma 重算：预测下个月（唯一月度调度入口）
  scheduler:
    cron: ${FORECAST_SCHEDULER_CRON:0 0 1 1 * ?}
