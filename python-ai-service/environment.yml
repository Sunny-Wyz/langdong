name: langdong
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python 核心
  - python=3.11
  - pip
  
  # PyTorch（M1 Pro 优化，仅 CPU/MPS，无 CUDA）
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  
  # 数据处理（轻量级）
  - pandas
  - numpy
  - scipy
  
  # 机器学习（推理用）
  - scikit-learn
  - xgboost
  
  # 数据库驱动
  - sqlalchemy
  - pymysql
  
  # 开发工具
  - ipython
  - black
  - flake8
  - pytest
  
  # pip 依赖
  - pip:
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0
    - pydantic==2.6.0
    - aiofiles==23.2.1
    - mlflow==2.11.0
    - httpx==0.25.2
    - aiohttp==3.9.1
    - celery==5.3.6
    - redis==5.0.1
    - async-timeout==4.0.3
    - python-dotenv==1.0.0
    - pytest-asyncio==0.23.2
    - python-json-logger==2.0.7
